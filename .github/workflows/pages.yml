name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build market snapshot
        env:
          DATABENTO_API_KEY: ${{ secrets.DATABENTO_API_KEY }}
          MES_SYMBOL: MES.c.0
          YAHOO_SYMBOL: MES=F
          DATABENTO_DATASET: GLBX.MDP3
        run: python scripts/build_pages_snapshot.py

      - name: Build template automation snapshot
        run: python scripts/build_template_snapshot.py

      - name: Prepare static site
        run: |
          mkdir -p dist/data
          cp index.html trading-template.html trading-template-es.html trading-template-zb.html .nojekyll dist/
          cp data/snapshot.json data/template-snapshot.json data/template-snapshot.js data/economic-calendar.json dist/data/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
